{% extends 'base.html' %}

{% block titulo %}Mapa de Salas - ATO Espaço de Dança{% endblock %}

{% block conteudo %}
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales-all.min.js'></script>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Mapa Visual de Salas</h2>
        <a href="/cadastrar_turma" class="btn badge-ato shadow-sm">+ Nova Turma</a>
    </div>

    <div class="card shadow-sm p-4 bg-white border-0" style="border-radius: 12px;">
        <div id='calendar'></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                locale: 'pt-br',
                
                slotMinTime: '07:00:00', 
                slotMaxTime: '22:00:00',
                
                allDaySlot: false,
                expandRows: true,
                
                headerToolbar: {
                    left: '',
                    center: 'title',
                    right: ''
                },

                events: '/api/cronograma' 
            });
            
            calendar.render();
        });
    </script>
{% endblock %}
