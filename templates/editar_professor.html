{% extends 'base.html' %}

{% block titulo %}Editar Professor - ATO Espaço de Dança{% endblock %}

{% block conteudo %}
    <h2 class="mb-4">Editar Professor</h2>

    <div class="card shadow-sm" style="max-width: 800px; margin: 0 auto;">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Editando os dados de: <strong>{{ professor['nome'] }}</strong></h5>
        </div>
        
        <div class="card-body">
            
            <form action="/editar_professor/{{ professor['id_professor'] }}" method="POST">
                
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome Completo*</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ professor['nome'] }}" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="telefone" class="form-label">Telefone / WhatsApp*</label>
                        <input type="tel" class="form-control" id="telefone" name="telefone" value="{{ professor['telefone'] }}" onkeyup="mascaraTelefone(event)" maxlength="15" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label for="chave_pix" class="form-label">Chave PIX</label>
                        <input type="text" class="form-control" id="chave_pix" name="chave_pix" value="{{ professor['chave_pix'] }}">
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="/professores" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn badge-ato shadow-sm" style="font-size: 1rem; padding: 8px 20px;">Salvar Alterações</button>
                </div>

            </form>

        </div>
    </div>
{% endblock %}
