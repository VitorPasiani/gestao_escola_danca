<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Aluno - Espaço ATO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <nav class="navbar navbar-dark navbar-ato mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{{ url_for('static', filename='imagens/logo+horizontal+09.svg') }}" alt="Logo Espaço ATO" height="40">
            </a>
        </div>
    </nav>

    <div class="container">
        
        <h2 class="mb-4">Cadastrar novo aluno</h2>

        <div class="card shadow-sm" style="max-width: 600px; margin: 0 auto;">
            
            <div class="card-header card-header-ato">
                <h5 class="mb-0">Dados do aluno</h5>
            </div>
            
            <div class="card-body">
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        <strong>Pronto!</strong> {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                      </div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}
                
                <form action="/cadastrar_aluno" method="POST">
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo*</label>
                        <input type="text" class="form-control" id="nome" name="nome" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" name="cpf">
                    </div>

                    <div class="mb-3">
                        <label for="rg" class="form-label">RG</label>
                        <input type="text" class="form-control" id="rg" name="rg">
                    </div>

                    <div class="mb-3">
                        <label for="endereco" class="form-label">Endereço</label>
                        <input type="text" class="form-control" id="endereco" name="endereco">
                    </div>

                    <div class="mb-3">
                        <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                        <input type="date" class="form-control" id="data_nascimento" name="data_nascimento">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>

                    <div class="mb-3">
                        <label for="contato_1" class="form-label">Telefone (Contato 1)*</label>
                        <input type="tel" class="form-control" id="contato_1" name="contato_1" required>
                    </div>

                    <div class="mb-3">
                        <label for="contato_2" class="form-label">Telefone (Contato 2)</label>
                        <input type="tel" class="form-control" id="contato_2" name="contato_2">
                    </div>

                    <div class="mb-3">
                        <label for="responsavel" class="form-label">Responsável</label>
                        <input type="text" class="form-control" id="responsavel" name="responsavel">
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="/" class="btn btn-outline-secondary">Página Inicial</a>
                        
                        <button type="reset" class="btn btn-outline-secondary">Cancelar(Limpar)</button>
                        
                        <button type="submit" class="btn badge-ato" style="font-size: 1rem; padding: 8px 20px;">Salvar Cadastro</button>
                    </div>

                </form>

            </div>
        </div>

    </div>

</body>
</html>
