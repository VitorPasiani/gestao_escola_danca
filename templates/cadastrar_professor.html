{% extends 'base.html' %}

{% block titulo %}Cadastrar Professor - ATO Espaço de Dança{% endblock %}

{% block conteudo %}
    <h2 class="mb-4">{% if editando %}Editar Professor{% else %}Cadastrar novo professor{% endif %}</h2>

    <div class="card shadow-sm" style="max-width: 600px; margin: 0 auto;">
        <div class="card-header card-header-ato">
            <h5 class="mb-0">Dados do Professor</h5>
        </div>
            
            <div class="card-body">

                <form action="{% if editando %}/editar_professor/{{ professor['id_professor'] }}{% else %}/cadastrar_professor{% endif %}" method="POST" autocomplete="off">
                    
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome Completo*</label>
                        <input type="text" class="form-control" id="nome" name="nome" value="{% if editando %}{{ professor['nome'] }}{% endif %}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="telefone" class="form-label">Telefone / WhatsApp</label>
                        <input type="tel" class="form-control" id="telefone" name="telefone" value="{% if editando %}{{ professor['telefone'] }}{% endif %}" onkeyup="mascaraTelefone(event)" maxlength="15" placeholder="(00) 00000-0000">
                    </div>
                    
                    <div class="mb-3">
                        <label for="chave_pix" class="form-label">Chave PIX (Para repasses)</label>
                        <input type="text" class="form-control" id="chave_pix" name="chave_pix" value="{% if editando %}{{ professor['chave_pix'] }}{% endif %}">
                        <div class="form-text">CPF, E-mail, Celular ou Aleatória.</div>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="/" class="btn btn-outline-secondary">Página Inicial</a>
                        <button type="reset" class="btn btn-outline-secondary">Cancelar (Limpar)</button>
                        <button type="submit" class="btn badge-ato" onclick="this.disabled=true; this.form.submit();" style="font-size: 1rem; padding: 8px 20px;">Salvar Registro</button>
                    </div>

                </form>

            </div>
        </div>

{% endblock %}
